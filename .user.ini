// ============================================================
// .user.ini — 宝塔面板 PHP 安全配置
// ============================================================
// 作用：限制 PHP 只能访问网站根目录下的文件，防止跨站攻击
// 宝塔创建网站时会自动生成此文件，如未生成可手动创建
// ============================================================

// 限制 PHP 访问路径（open_basedir）
// 路径与宝塔网站根目录一致，部署后确认路径正确
open_basedir=/www/wwwroot/101.37.34.234/:/tmp/

// 上传文件最大大小
upload_max_filesize=20M

// POST 表单最大大小
post_max_size=20M

// 脚本最大执行时间（秒）
max_execution_time=300

// 内存限制
memory_limit=128M

// 时区设置为东八区
date.timezone=Asia/Shanghai
